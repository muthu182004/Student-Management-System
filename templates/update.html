<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Update Student</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
  <h3 class="text-center mb-4">✏️ Update Student Information</h3>
  <form action="/update/{{ student[0] }}" method="POST" class="p-3 border rounded bg-light shadow-sm">
    <div class="row g-2 mb-2">
      <div class="col"><input type="text" name="student_id" class="form-control" value="{{ student[1] }}" required></div>
      <div class="col"><input type="text" name="name" class="form-control" value="{{ student[2] }}" required></div>
    </div>
    <div class="row g-2 mb-2">
      <div class="col"><input type="text" name="father_name" class="form-control" value="{{ student[3] }}" required></div>
      <div class="col"><input type="text" name="mother_name" class="form-control" value="{{ student[4] }}" required></div>
    </div>
    <div class="row g-2 mb-2">
      <div class="col"><input type="date" name="dob" class="form-control" value="{{ student[5] }}" required></div>
      <div class="col"><input type="text" name="address" class="form-control" value="{{ student[6] }}" required></div>
    </div>
    <div class="row g-2 mb-2">
      <div class="col"><input type="text" name="phone" class="form-control" value="{{ student[7] }}" required></div>
      <div class="col"><input type="email" name="email" class="form-control" value="{{ student[8] }}" required></div>
    </div>
    <div class="row g-2 mb-2">
      <div class="col">
        <label class="form-label small mb-1">Degree</label>
        <select name="degree" class="form-select" required>
          <option value="">Select Degree</option>
          <option value="B.E" {% if student[9]=='B.E' %}selected{% endif %}>B.E</option>
          <option value="B.Tech" {% if student[9]=='B.Tech' %}selected{% endif %}>B.Tech</option>
        </select>
      </div>
      <div class="col">
        <label class="form-label small mb-1">Stream</label>
        <select name="stream" class="form-select" required>
          <option value="">Select Stream</option>
          <option value="CSE" {% if student[10]=='CSE' %}selected{% endif %}>CSE</option>
          <option value="IT" {% if student[10]=='IT' %}selected{% endif %}>IT</option>
          <option value="EEE" {% if student[10]=='EEE' %}selected{% endif %}>EEE</option>
          <option value="ECE" {% if student[10]=='ECE' %}selected{% endif %}>ECE</option>
          <option value="ME" {% if student[10]=='ME' %}selected{% endif %}>ME</option>
        </select>
      </div>
    </div>
    <div class="row g-2 mb-2">
      <div class="col"><input type="number" name="year_of_joining" class="form-control" value="{{ student[11] }}" required></div>
      <div class="col"><input type="number" name="year_of_pass_out" class="form-control" value="{{ student[12] }}" required></div>
    </div>
    <div class="text-center mt-3">
      <button type="submit" class="btn btn-success px-4">Update</button>
      <a href="/" class="btn btn-secondary px-4">Cancel</a>
    </div>
  </form>
</div>
</body>
</html>
